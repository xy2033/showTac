wandb:
  entity: null
  resume: 'auto'

# =============================================================================
# Stage 2 QA-NTP: Full Model Fine-tuning with Tactile QA NTP Supervision
#
# Mixed training: 50% pure generation + 50% QA generation
#   loss = flow_coeff * loss_flow + ntp_coeff * loss_ntp
#
# Ablation: use_tactile_qa=false + ntp_coeff=0 → pure Stage2 baseline
#           use_tactile_qa=true  + ntp_coeff=0.5 → QA-NTP joint training
# =============================================================================

experiment:
    project: "showo2-tactile-stage-2-qa"
    name: "showo2-1.5b-tactile-stage-2-qa"
    output_dir: "outputs/showo2-1.5b-tactile-stage-2-qa"
    output_dataloader_state_dir: null
    save_every: 3000
    generate_every: 1000
    log_every: 20
    log_grad_norm_every: 500
    resume_from_checkpoint: false
    checkpoints_total_limit: 1

model:
    vae_model:
        type: "wan21"
        pretrained_model_path: "Wan2.1_VAE.pth"

    showo:
        model_name: "Showo2"
        load_from_showo: True
        # Set false when you want to verify that the Stage 1 checkpoint
        # already contains tactile_force_head weights.
        allow_missing_tactile_force_head: True
        pretrained_model_path: "outputs/showo2-1.5b-tactile-stage-1/checkpoint-final/unwrapped_model"
        llm_model_path: "Qwen/Qwen2.5-1.5B-Instruct"
        llm_vocab_size: null
        hidden_size: 1536
        image_latent_dim: 16
        image_latent_height: 27
        image_latent_width: 27
        patch_size: 2
        num_diffusion_layers: 10
        clip_latent_dim: 1152
        add_qk_norm: True
        add_time_embeds: True
        frozen_params: []
        params_not_load: null

    clip:
        pretrained_model_path: "google/siglip-so400m-patch14-384"

    gradient_checkpointing: True

dataset:
    samp_probs: null
    accumulation: 1
    mixed_loader_mode: "concat_max_size_cycle"
    params:
        tactile_data_root: "/media/xy/Elements/tac/tacquad_gelsight_img/data_indoor"
        tactile_csv_path: "/media/xy/Elements/tac/tacquad_gelsight_img/contact_indoor_list_tvl.csv"
        tactile_qa_csv_path: "tac_QA/tactile_qa_pairs.csv"
        num_frames: 5
        validation_prompts_file: "prompts/t2i_prompts.txt"
        shuffle_buffer_size: 1000
        num_workers: 4
        pin_memory: True
        persistent_workers: True

    preprocessing:
        max_seq_length: 8192
        resolution: 432
        num_frames: ${dataset.params.num_frames}
        num_visual_tokens_per_frame: 729
        num_tactile_tokens_per_frame: 729
        num_visual_tokens: 3645
        num_tactile_tokens: 3645
        latent_height: ${model.showo.image_latent_height}
        latent_width: ${model.showo.image_latent_width}
        min_res: [64, 64]

optimizer:
    name: adamw
    params:
        learning_rate: 0.00001
        learning_rate_ve: 0.000002
        learning_rate_proj: 0.00001
        learning_rate_showo: 0.000002
        scale_lr: False
        beta1: 0.9
        beta2: 0.999
        weight_decay: 0.0
        epsilon: 1e-8

lr_scheduler:
    scheduler: "cosine"
    params:
        warmup_steps: null
        warmup_ratio: 0.03

transport:
    path_type: "Linear"
    prediction: "velocity"
    loss_weight: null
    train_eps: null
    sample_eps: null
    snr_type: "lognorm"
    sampling_method: "euler"
    guidance_scale: 5.0
    num_inference_steps: 50
    atol: 1e-6
    rtol: 1e-3
    reverse: False
    do_shift: True
    time_shifting_factor: 3.0

training:
    gradient_accumulation_steps: 1
    batch_size_tactile: 1                  # Pure Gen per step
    batch_size_tactile_qa: 1              # QA per step (total batch=2)
    mixed_precision: "bf16"
    enable_tf32: True
    seed: 42
    max_train_steps: 10000
    cond_dropout_prob: 0.1
    label_smoothing: 0.0
    max_grad_norm: 1.0
    use_tactile_qa: true                     # ← master switch: false → pure baseline
    ntp_coeff: 0.5                        # NTP QA supervision weight
    flow_coeff: 1.0
    und_max_t0: 1.0
