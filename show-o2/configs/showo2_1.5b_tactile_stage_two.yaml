wandb:
  entity: null
  resume: 'auto'

# =============================================================================
# Stage 2: Full Model Fine-tuning for Tactile-Video Generation
# Unfreezes: All parameters with differentiated learning rates
#   - Semantic layers (und_trans, image_embedder): 2e-6 (preserve pre-trained features)
#   - Fusion proj + Diffusion head:             1e-5 (primary adaptation)
#   - LLM backbone (showo):                    2e-6 (gentle fine-tuning)
# Resume from: Stage 1 checkpoint
# =============================================================================

experiment:
    project: "showo2-tactile-stage-2"
    name: "showo2-1.5b-tactile-stage-2"
    output_dir: "outputs/showo2-1.5b-tactile-stage-2"
    output_dataloader_state_dir: null
    save_every: 1000
    generate_every: 500
    log_every: 20
    log_grad_norm_every: 500
    resume_from_checkpoint: 'latest'
    checkpoints_total_limit: 3

model:
    vae_model:
        type: "wan21"
        pretrained_model_path: "Wan2.1_VAE.pth"

    showo:
        model_name: "Showo2"
        load_from_showo: True
        # Point to Stage 1 output checkpoint
        pretrained_model_path: "outputs/showo2-1.5b-tactile-stage-1/checkpoint-final/unwrapped_model"
        llm_model_path: "Qwen/Qwen2.5-1.5B-Instruct"
        llm_vocab_size: null
        hidden_size: 1536
        image_latent_dim: 16
        image_latent_height: 27
        image_latent_width: 27
        patch_size: 2
        num_diffusion_layers: 10
        clip_latent_dim: 1152
        add_qk_norm: True
        add_time_embeds: True
        # Stage 2: Unfreeze everything (empty list or null)
        # Differentiated LR handled via optimizer param_groups
        frozen_params: []
        params_not_load: null

    clip:
        pretrained_model_path: "google/siglip-so400m-patch14-384"

    gradient_checkpointing: True

dataset:
    samp_probs: null
    accumulation: 1
    mixed_loader_mode: "max_size_cycle"
    params:
        tactile_data_root: "/media/xy/Elements/tac/tacquad_gelsight_img/data_indoor"
        tactile_csv_path: "/media/xy/Elements/tac/tacquad_gelsight_img/contact_indoor_list_tvl.csv"
        num_frames: 5
        validation_prompts_file: "prompts/t2i_prompts.txt"
        shuffle_buffer_size: 1000
        num_workers: 4
        pin_memory: True
        persistent_workers: True

    preprocessing:
        max_seq_length: 8192
        resolution: 432
        num_frames: ${dataset.params.num_frames}
        num_visual_tokens_per_frame: 729
        num_tactile_tokens_per_frame: 729
        num_visual_tokens: 3645
        num_tactile_tokens: 3645
        latent_height: ${model.showo.image_latent_height}
        latent_width: ${model.showo.image_latent_width}
        min_res: [64, 64]

optimizer:
    name: adamw
    params:
        # Base LR (fallback for any params not in a specific group)
        learning_rate: 0.00001            # 1e-5

        # Differentiated learning rates for Stage 2
        # Vision Encoder: SigLIP semantic layers — minimal change
        learning_rate_ve: 0.000002        # 2e-6

        # Projector + Diffusion: fusion_proj, diffusion_head — primary adaptation
        learning_rate_proj: 0.00001       # 1e-5

        # LLM backbone: Qwen2.5 — gentle fine-tuning
        learning_rate_showo: 0.000002     # 2e-6

        scale_lr: False
        beta1: 0.9
        beta2: 0.999
        weight_decay: 0.0
        epsilon: 1e-8

lr_scheduler:
    scheduler: "cosine"                    # Cosine decay for smooth convergence
    params:
        warmup_steps: null                 # Will be calculated from warmup_ratio
        warmup_ratio: 0.03                 # 3% warmup

transport:
    path_type: "Linear"
    prediction: "velocity"
    loss_weight: null
    train_eps: null
    sample_eps: null
    snr_type: "lognorm"
    sampling_method: "euler"
    guidance_scale: 5.0
    num_inference_steps: 50
    atol: 1e-6
    rtol: 1e-3
    reverse: False
    do_shift: True
    time_shifting_factor: 3.0

training:
    gradient_accumulation_steps: 1
    batch_size_tactile: 2                  # Same as Stage 1
    mixed_precision: "bf16"
    enable_tf32: True
    seed: 42
    max_train_steps: 10000                 # ~100 passes over dataset
    cond_dropout_prob: 0.1
    label_smoothing: 0.0
    max_grad_norm: 1.0
    ntp_coeff: 0.0                        # Flow loss only
    flow_coeff: 1.0
    und_max_t0: 1.0
